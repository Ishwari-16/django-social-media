{% extends "base.html" %}

{% block title %}Update Profile Image{% endblock %}

{% block body %}
<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-lg shadow-md">
  <h2 class="text-2xl font-bold mb-4 text-center">Update Your Profile Image</h2>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="image" class="w-full mb-4 border p-2 rounded" />
    <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">Update Image</button>
  </form>
</div>
{% endblock %}
