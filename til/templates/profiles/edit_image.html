{% extends "base.html" %}

{% block title %}Update Profile Image{% endblock %}

{% block body %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Update Your Profile Image</h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
      {% csrf_token %}
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Choose New Image</label>
        <input type="file" name="image" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all" />
      </div>

      <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
        Update Image
      </button>
    </form>
  </div>
</div>
{% endblock %}
