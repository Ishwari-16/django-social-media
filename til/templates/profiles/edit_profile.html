{% extends "base.html" %}
{% load static %}

{% block title %}Edit Profile{% endblock %}

{% block body %}
<div class="max-w-md mx-auto bg-white shadow-md p-6 rounded-lg mt-10">
  <h2 class="text-2xl font-bold mb-4 text-center">Edit Your Profile</h2>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>First Name:</label>
    <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full border p-2 mb-4 rounded" />

    <label>Last Name:</label>
    <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full border p-2 mb-4 rounded" />

    <label>Username:</label>
    <input type="text" name="username" value="{{ user.username }}" class="w-full border p-2 mb-4 rounded" />

    <label>New Password:</label>
    <input type="password" name="password" class="w-full border p-2 mb-4 rounded" placeholder="Enter new password (optional)" />

    <label>Profile Image:</label><br />
    {% if user.profile.image %}
      <img src="{{ user.profile.image.url }}" class="w-24 h-24 rounded-full mb-2" />
    {% endif %}
    <input type="file" name="profile_image" class="w-full mb-4" />

    <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">Save Changes</button>
  </form>
</div>
{% endblock %}
