{% extends 'base.html' %}

{% block body %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Edit Name / Username</h2>

    <form method="POST" class="space-y-6">
      {% csrf_token %}
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all" name="first_name" value="{{ user.first_name }}">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all" name="last_name" value="{{ user.last_name }}">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all" name="username" value="{{ user.username }}">
      </div>

      <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
        Update
      </button>
    </form>
  </div>
</div>
{% endblock %}
