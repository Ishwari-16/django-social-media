{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}My Site{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <div class="text-xl font-bold text-indigo-600">
      <a href="/">TIL</a>
    </div>

    <div class="flex items-center space-x-4">
      {% if request.user.is_authenticated %}
        <span class="text-sm font-medium text-gray-700">{{ request.user.username }}</span>

        <!-- Profile image -->
        <img 
          src="{% if request.user.profile.image %}{{ request.user.profile.image.url }}{% else %}{% static 'images/default.jpg' %}{% endif %}" 
          alt="Profile"
          class="w-10 h-10 rounded-full object-cover border"
        />

        <a href="{% url 'account_logout' %}" class="text-sm text-red-600 hover:underline">Logout</a>
      {% else %}
        <a href="{% url 'account_login' %}" class="text-sm text-blue-600 hover:underline">Login</a>
      {% endif %}
    </div>
  </header>

  <!-- Content -->
  <main class="p-6">
    {% block body %}
    {% block content %}{% endblock %}
    {% endblock %}
  </main>

</body>
</html>
