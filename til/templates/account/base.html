
<!-- templates/account/login.html -->
{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Login</h2>
    <form method="POST">
      {{ form.as_p }}
      <button type="submit" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded">Login</button>
    </form>
  </div>
{% endblock %}
