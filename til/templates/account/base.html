{% block body %}
  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
            {{ message }}
          </li>
        {% endfor %}
      </ul>
      <a href="/">Home</a>
    {% endif %}
    
    {% block content %}
    {% endblock content %}
  </div>
  {% endblock %}
