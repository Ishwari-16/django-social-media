{% extends "base.html" %}

{% block title %}Create a new post{% endblock title %}

{% block body %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-6">Create a New Post</h2>

    <form method="POST" action="." class="space-y-6">
      {% csrf_token %}
      {{ form.as_p }}

      <div>
        <button class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg flex items-center justify-center" type="submit">
          <span class="mr-2">Create Post</span>
          <i class='bx bx-send'></i>
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock body %}
