{% extends "base.html" %}

{% block title %}All Users{% endblock %}

{% block content %}
  <div class="max-w-4xl mx-auto p-4 bg-white rounded shadow">
    <h2 class="text-xl font-bold mb-4">All Users</h2>
    <ul>
      {% for user in users %}
        <li class="mb-2">
          <a href="{% url 'profiles:detail' user.username %}" class="text-blue-600 hover:underline">
            {{ user.username }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
