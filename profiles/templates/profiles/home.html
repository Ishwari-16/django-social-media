<!-- templates/profiles/home.html -->
<!DOCTYPE html>
<html>
<head>
    <title>All Profiles</title>
</head>
<body>
    <h1>All User Profiles</h1>
    <ul>
        {% for user in users %}
            <li>
                <a href="{% url 'profiles:detail' user.username %}">
                    {{ user.username }}
                </a>
            </li>
        {% empty %}
            <li>No users found.</li>
        {% endfor %}
    </ul>
</body>
</html>
